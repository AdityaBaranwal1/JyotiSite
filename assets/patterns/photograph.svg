<svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Photograph placeholder">
  <defs>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1F2D50" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="240" height="180" fill="#FDFBF4"/>
  <rect x="4" y="4" width="232" height="172" fill="none" stroke="#1F2D50" stroke-width="2"/>
  <rect x="14" y="14" width="212" height="138" fill="url(#hatch)" opacity="0.35"/>
  <rect x="60" y="72" width="120" height="26" fill="#FDFBF4"/>
  <text x="120" y="90" text-anchor="middle" fill="#1F2D50" font-family="Georgia, serif" font-size="13" letter-spacing="3">PHOTOGRAPH</text>
  <text x="120" y="168" text-anchor="middle" fill="#1F2D50" font-family="Georgia, serif" font-style="italic" font-size="11">photograph to come</text>
